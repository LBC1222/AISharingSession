<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二倍角公式 - 高中数学公式可视化</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff; transition: all 0.3s ease;
        }
        body.light-theme { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 2.2em; margin-bottom: 10px; background: linear-gradient(90deg, #fd79a8, #fdcb6e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .formula-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 15px 0; }
        .formula-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 15px 25px; border: 1px solid rgba(255,255,255,0.2);
        }
        body.light-theme .formula-box { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); }
        .formula { font-size: 1.4em; color: #fd79a8; font-family: "Times New Roman", serif; }
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; padding: 10px 20px;
            border: none; border-radius: 25px; background: rgba(255,255,255,0.2);
            color: #fff; cursor: pointer; transition: all 0.3s;
        }
        body.light-theme .theme-toggle { background: rgba(0,0,0,0.1); color: #333; }
        .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 30px; margin-top: 20px; }
        #plot { background: rgba(255,255,255,0.05); border-radius: 15px; min-height: 600px; }
        body.light-theme #plot { background: rgba(255,255,255,0.9); }
        .control-panel {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.2);
        }
        body.light-theme .control-panel { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; margin-bottom: 8px; font-size: 1.1em; color: #fd79a8; }
        input[type="range"] {
            width: 100%; height: 8px; border-radius: 4px;
            background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #fd79a8; cursor: pointer;
        }
        .value-display { text-align: right; font-size: 1.2em; margin-top: 5px; color: #fff; }
        body.light-theme .value-display { color: #333; }
        .result-panel {
            background: rgba(253,121,168,0.1); border-radius: 10px; padding: 20px; margin-top: 20px;
        }
        body.light-theme .result-panel { background: rgba(253,121,168,0.2); }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .result-value { color: #fd79a8; font-weight: bold; font-size: 1.1em; }
        .formula-list { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; margin-top: 20px; font-size: 1em; line-height: 1.8; }
        body.light-theme .formula-list { background: rgba(255,255,255,0.8); }
        .formula-list div { margin-bottom: 8px; }
        .highlight { color: #fdcb6e; font-weight: bold; }
        .hint { background: rgba(255,193,7,0.2); border-radius: 10px; padding: 15px; margin-top: 15px; font-size: 0.95em; line-height: 1.6; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 深色/浅色</button>
    <div class="container">
        <header>
            <h1>🔄 二倍角公式</h1>
            <div class="formula-container">
                <div class="formula-box">
                    <div class="formula">sin2α = 2sinα·cosα</div>
                </div>
                <div class="formula-box">
                    <div class="formula" style="color: #fdcb6e;">cos2α = cos²α - sin²α</div>
                </div>
            </div>
        </header>
        
        <div class="main-content">
            <div id="plot"></div>
            <div class="control-panel">
                <h2 style="margin-bottom: 20px; color: #fd79a8;">🎛️ 参数控制</h2>
                <div class="control-group">
                    <label>α 角度 (°)</label>
                    <input type="range" id="alpha" min="0" max="90" value="30">
                    <div class="value-display" id="alpha-value">30°</div>
                </div>
                
                <div class="result-panel">
                    <h3 style="margin-bottom: 15px; color: #fd79a8;">📊 计算结果</h3>
                    <div class="result-item"><span>sinα =</span><span class="result-value" id="sinAlpha">--</span></div>
                    <div class="result-item"><span>cosα =</span><span class="result-value" id="cosAlpha">--</span></div>
                    <div class="result-item"><span>sin2α =</span><span class="result-value" id="sin2Alpha">--</span></div>
                    <div class="result-item"><span>cos2α =</span><span class="result-value" id="cos2Alpha">--</span></div>
                    <div class="result-item"><span>2sinα·cosα =</span><span class="result-value" id="doubleSin">--</span></div>
                    <div class="result-item"><span>cos²α-sin²α =</span><span class="result-value" id="doubleCos">--</span></div>
                </div>
                
                <div class="formula-list">
                    <div><b>sin2α的公式：</b></div>
                    <div style="padding-left: 20px;">
                        sin2α = 2sinα·cosα
                    </div>
                    <div style="margin-top: 10px;"><b>cos2α的公式：</b></div>
                    <div style="padding-left: 20px;">
                        ① <span class="highlight">cos2α = cos²α - sin²α</span><br>
                        ② cos2α = 2cos²α - 1<br>
                        ③ cos2α = 1 - 2sin²α
                    </div>
                </div>
                
                <div class="hint">
                    💡 提示：观察2α角对应的是两个相同角α的叠加。二倍角公式揭示了角度加倍时三角函数的倍增规律。
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let isDarkTheme = true;
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('light-theme');
            updatePlot();
        }
        function degToRad(d) { return d * Math.PI / 180; }
        
        function updatePlot() {
            const alpha = parseFloat(document.getElementById('alpha').value);
            const alphaRad = degToRad(alpha);
            const doubleAlphaRad = degToRad(2 * alpha);
            
            document.getElementById('alpha-value').textContent = alpha + '°';
            
            // 计算三角函数值
            const sinAlpha = Math.sin(alphaRad);
            const cosAlpha = Math.cos(alphaRad);
            const sin2Alpha = Math.sin(doubleAlphaRad);
            const cos2Alpha = Math.cos(doubleAlphaRad);
            const doubleSin = 2 * sinAlpha * cosAlpha;
            const doubleCos = cosAlpha * cosAlpha - sinAlpha * sinAlpha;
            
            // 更新结果显示
            document.getElementById('sinAlpha').textContent = sinAlpha.toFixed(4);
            document.getElementById('cosAlpha').textContent = cosAlpha.toFixed(4);
            document.getElementById('sin2Alpha').textContent = sin2Alpha.toFixed(4);
            document.getElementById('cos2Alpha').textContent = cos2Alpha.toFixed(4);
            document.getElementById('doubleSin').textContent = doubleSin.toFixed(4);
            document.getElementById('doubleCos').textContent = doubleCos.toFixed(4);
            
            // 构建几何图形
            const radius = 3;
            // α角的终点
            const ax = radius * Math.cos(alphaRad);
            const ay = radius * Math.sin(alphaRad);
            // 2α角的终点
            const bx = radius * Math.cos(doubleAlphaRad);
            const by = radius * Math.sin(doubleAlphaRad);
            // α角的垂直投影
            const cx = 0;
            const cy = ay;
            
            const traces = [
                // 单位圆
                {
                    x: [radius * Math.cos(t) for t in Array.from({length: 101}, (_, i) => 2*Math.PI*i/100)],
                    y: [radius * Math.sin(t) for t in Array.from({length: 101}, (_, i) => 2*Math.PI*i/100)],
                    mode: 'lines', name: '圆', line: { color: 'rgba(255,255,255,0.3)', width: 2 }
                },
                // α向量
                {
                    x: [0, ax], y: [0, ay],
                    mode: 'lines+markers', name: 'α向量',
                    line: { color: '#fd79a8', width: 4 },
                    marker: { size: 10 }
                },
                // 2α向量
                {
                    x: [0, bx], y: [0, by],
                    mode: 'lines+markers', name: '2α向量',
                    line: { color: '#fdcb6e', width: 5 },
                    marker: { size: 12 }
                },
                // sinα高度线
                {
                    x: [ax, 0], y: [ay, ay],
                    mode: 'lines', name: 'sinα',
                    line: { color: '#fd79a8', width: 2, dash: 'dot' }
                },
                // sin2α高度线
                {
                    x: [bx, 0], y: [by, by],
                    mode: 'lines', name: 'sin2α',
                    line: { color: '#fdcb6e', width: 2, dash: 'dot' }
                },
                // cosα水平线
                {
                    x: [ax, ax], y: [0, ay],
                    mode: 'lines', name: 'cosα',
                    line: { color: '#00b894', width: 2, dash: 'dash' }
                },
                // 角度标注 - α
                {
                    x: [0.5], y: [0.3],
                    mode: 'text', text: [`α=${alpha}°`],
                    textfont: { size: 16, color: '#fd79a8' }
                },
                // 角度标注 - 2α
                {
                    x: [0.8], y: [0.5],
                    mode: 'text', text: [`2α=${2*alpha}°`],
                    textfont: { size: 16, color: '#fdcb6e' }
                },
                // 函数值标注
                {
                    x: [-0.5], y: [ay],
                    mode: 'text', text: [`sinα=${sinAlpha.toFixed(3)}`],
                    textfont: { size: 14, color: '#fd79a8' }
                },
                {
                    x: [-0.5], y: [by],
                    mode: 'text', text: [`sin2α=${sin2Alpha.toFixed(3)}`],
                    textfont: { size: 14, color: '#fdcb6e' }
                },
                {
                    x: [ax], y: [-0.4],
                    mode: 'text', text: [`cosα=${cosAlpha.toFixed(3)}`],
                    textfont: { size: 14, color: '#00b894' }
                },
                // 坐标轴
                {
                    x: [-4, 4], y: [0, 0],
                    mode: 'lines', name: 'x轴',
                    line: { color: 'rgba(255,255,255,0.3)', width: 1 }
                },
                {
                    x: [0, 0], y: [-4, 4],
                    mode: 'lines', name: 'y轴',
                    line: { color: 'rgba(255,255,255,0.3)', width: 1 }
                }
            ];
            
            const layout = {
                showlegend: false,
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                xaxis: { showgrid: true, gridcolor: 'rgba(255,255,255,0.1)', zeroline: false, range: [-4, 4], scaleanchor: 'y', scaleratio: 1 },
                yaxis: { showgrid: true, gridcolor: 'rgba(255,255,255,0.1)', zeroline: false, range: [-4, 4] },
                margin: { l: 60, r: 60, t: 30, b: 50 }
            };
            
            if (!isDarkTheme) {
                layout.xaxis.gridcolor = 'rgba(0,0,0,0.1)';
                layout.yaxis.gridcolor = 'rgba(0,0,0,0.1)';
            }
            
            Plotly.react('plot', traces, layout, {displayModeBar: false});
        }
        
        document.getElementById('alpha').addEventListener('input', updatePlot);
        updatePlot();
    </script>
</body>
</html>
