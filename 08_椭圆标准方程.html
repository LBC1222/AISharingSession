<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椭圆标准方程 - 高中数学公式可视化</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff; transition: all 0.3s ease;
        }
        body.light-theme { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 2.2em; margin-bottom: 10px; background: linear-gradient(90deg, #a29bfe, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .formula-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 20px 30px; margin: 20px auto;
            display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }
        body.light-theme .formula-box { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); }
        .formula { font-size: 1.8em; color: #a29bfe; font-family: "Times New Roman", serif; }
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; padding: 10px 20px;
            border: none; border-radius: 25px; background: rgba(255,255,255,0.2);
            color: #fff; cursor: pointer; transition: all 0.3s;
        }
        body.light-theme .theme-toggle { background: rgba(0,0,0,0.1); color: #333; }
        .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 30px; margin-top: 20px; }
        #plot { background: rgba(255,255,255,0.05); border-radius: 15px; min-height: 600px; }
        body.light-theme #plot { background: rgba(255,255,255,0.9); }
        .control-panel {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.2);
        }
        body.light-theme .control-panel { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; margin-bottom: 8px; font-size: 1.1em; color: #a29bfe; }
        input[type="range"] {
            width: 100%; height: 8px; border-radius: 4px;
            background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #a29bfe; cursor: pointer;
        }
        .value-display { text-align: right; font-size: 1.2em; margin-top: 5px; color: #fff; }
        body.light-theme .value-display { color: #333; }
        .result-panel {
            background: rgba(162,155,254,0.1); border-radius: 10px; padding: 20px; margin-top: 20px;
        }
        body.light-theme .result-panel { background: rgba(162,155,254,0.2); }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .result-value { color: #a29bfe; font-weight: bold; font-size: 1.1em; }
        .hint { background: rgba(255,193,7,0.2); border-radius: 10px; padding: 15px; margin-top: 15px; font-size: 0.95em; line-height: 1.6; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 深色/浅色</button>
    <div class="container">
        <header>
            <h1>🥚 椭圆标准方程</h1>
            <div class="formula-box">
                <div class="formula">x²/a² + y²/b² = 1 (a > b > 0)</div>
            </div>
        </header>
        
        <div class="main-content">
            <div id="plot"></div>
            <div class="control-panel">
                <h2 style="margin-bottom: 20px; color: #a29bfe;">🎛️ 参数控制</h2>
                <div class="control-group">
                    <label>长半轴 a</label>
                    <input type="range" id="a" min="2" max="6" step="0.5" value="4">
                    <div class="value-display" id="a-value">4</div>
                </div>
                <div class="control-group">
                    <label>短半轴 b</label>
                    <input type="range" id="b" min="1" max="5" step="0.5" value="3">
                    <div class="value-display" id="b-value">3</div>
                </div>
                
                <div class="result-panel">
                    <h3 style="margin-bottom: 15px; color: #a29bfe;">📊 椭圆参数</h3>
                    <div class="result-item"><span>长轴 2a =</span><span class="result-value" id="longAxis">8</span></div>
                    <div class="result-item"><span>短轴 2b =</span><span class="result-value" id="shortAxis">6</span></div>
                    <div class="result-item"><span>焦距 2c =</span><span class="result-value" id="focalLength">--</span></div>
                    <div class="result-item"><span>焦点 c =</span><span class="result-value" id="focal">--</span></div>
                    <div class="result-item"><span>离心率 e =</span><span class="result-value" id="eccentricity">--</span></div>
                    <div class="result-item"><span>面积 =</span><span class="result-value" id="area">--</span></div>
                </div>
                
                <div class="hint">
                    💡 提示：椭圆是到两焦点距离之和为常数2a的点的轨迹。离心率 e = c/a 描述椭圆的扁平程度，e越接近1越扁，越接近0越圆。
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let isDarkTheme = true;
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('light-theme');
            updatePlot();
        }
        
        function updatePlot() {
            let a = parseFloat(document.getElementById('a').value);
            let b = parseFloat(document.getElementById('b').value);
            
            // 确保 a > b
            if (a <= b) {
                b = a - 0.5;
                document.getElementById('b').value = b;
            }
            
            document.getElementById('a-value').textContent = a;
            document.getElementById('b-value').textContent = b;
            
            // 计算参数
            const c = Math.sqrt(a * a - b * b);
            const eccentricity = c / a;
            const area = Math.PI * a * b;
            
            // 更新显示
            document.getElementById('longAxis').textContent = (2 * a).toFixed(1);
            document.getElementById('shortAxis').textContent = (2 * b).toFixed(1);
            document.getElementById('focalLength').textContent = (2 * c).toFixed(2);
            document.getElementById('focal').textContent = c.toFixed(2);
            document.getElementById('eccentricity').textContent = eccentricity.toFixed(3);
            document.getElementById('area').textContent = area.toFixed(2);
            
            // 生成椭圆点
            const ellipsePoints = [];
            for (let i = 0; i <= 200; i++) {
                const theta = 2 * Math.PI * i / 200;
                ellipsePoints.push({
                    x: a * Math.cos(theta),
                    y: b * Math.sin(theta)
                });
            }
            const ellipseX = ellipsePoints.map(p => p.x);
            const ellipseY = ellipsePoints.map(p => p.y);
            
            // 生成焦点附近的椭圆（用于显示焦距和）
            const sumPoints = [];
            const sum = 2 * a; // 到两焦点距离之和
            for (let i = 0; i <= 100; i++) {
                const theta = 2 * Math.PI * i / 100;
                sumPoints.push({
                    x: a * Math.cos(theta),
                    y: b * Math.sin(theta)
                });
            }
            
            // 焦点位置
            const f1x = -c, f1y = 0;
            const f2x = c, f2y = 0;
            
            // 顶点位置
            const v1x = -a, v1y = 0; // 左顶点
            const v2x = a, v2y = 0;  // 右顶点
            const v3x = 0, v3y = -b; // 上顶点
            const v4x = 0, v4y = b;  // 下顶点
            
            // 长半轴标注线
            const axisLineX = [-a - 0.5, a + 0.5];
            const axisLineY = [0, 0];
            
            const traces = [
                // 椭圆
                {
                    x: ellipseX, y: ellipseY,
                    mode: 'lines',
                    name: '椭圆',
                    line: { color: '#a29bfe', width: 4 },
                    fill: 'toself',
                    fillcolor: 'rgba(162,155,254,0.15)'
                },
                // 长轴
                {
                    x: [-a, a], y: [0, 0],
                    mode: 'lines',
                    name: '长轴',
                    line: { color: '#fd79a8', width: 2 }
                },
                // 短轴
                {
                    x: [0, 0], y: [-b, b],
                    mode: 'lines',
                    name: '短轴',
                    line: { color: '#74b9ff', width: 2 }
                },
                // 焦点1
                {
                    x: [f1x], y: [f1y],
                    mode: 'markers',
                    marker: { size: 15, color: '#fdcb6e', symbol: 'diamond' },
                    name: '焦点 F₁'
                },
                // 焦点2
                {
                    x: [f2x], y: [f2y],
                    mode: 'markers',
                    marker: { size: 15, color: '#fdcb6e', symbol: 'diamond' },
                    name: '焦点 F₂'
                },
                // 顶点标注
                {
                    x: [v1x, v2x, v3x, v4x],
                    y: [v1y - 0.3, v2y - 0.3, v3y + 0.3, v4y - 0.3],
                    mode: 'text',
                    text: ['V₁', 'V₂', "V₃", "V₄"],
                    textfont: { size: 14, color: '#fff' }
                },
                // 焦点标注
                {
                    x: [f1x, f2x],
                    y: [f1y - 0.3, f2y - 0.3],
                    mode: 'text',
                    text: ['F₁', 'F₂'],
                    textfont: { size: 14, color: '#fdcb6e' }
                },
                // a标注
                {
                    x: [-a/2], y: [0.3],
                    mode: 'text',
                    text: [`a=${a}`],
                    textfont: { size: 14, color: '#fd79a8' }
                },
                // b标注
                {
                    x: [0.3], y: [b/2],
                    mode: 'text',
                    text: [`b=${b}`],
                    textfont: { size: 14, color: '#74b9ff' }
                },
                // c标注
                {
                    x: [c/2], y: [0.3],
                    mode: 'text',
                    text: [`c=${c.toFixed(2)}`],
                    textfont: { size: 12, color: '#fdcb6e' }
                },
                // 离心率标注
                {
                    x: [0], y: [b + 1],
                    mode: 'text',
                    text: [`e = ${eccentricity.toFixed(3)}`],
                    textfont: { size: 16, color: '#a29bfe', bold: true }
                },
                // 焦点连线（虚线）
                {
                    x: [f1x, f2x], y: [0, 0],
                    mode: 'lines',
                    line: { color: '#fdcb6e', width: 1, dash: 'dash' }
                }
            ];
            
            const maxRange = Math.max(a, b) + 1;
            const layout = {
                title: {
                    text: `<b>x²/${a}² + y²/${b}² = 1</b>`,
                    font: { size: 24, color: '#a29bfe' }
                },
                showlegend: false,
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                xaxis: {
                    showgrid: true,
                    gridcolor: 'rgba(255,255,255,0.1)',
                    zeroline: true,
                    zerolinecolor: 'rgba(255,255,255,0.3)',
                    range: [-maxRange - 1, maxRange + 1],
                    scaleanchor: 'y',
                    scaleratio: 1
                },
                yaxis: {
                    showgrid: true,
                    gridcolor: 'rgba(255,255,255,0.1)',
                    zeroline: true,
                    zerolinecolor: 'rgba(255,255,255,0.3)',
                    range: [-maxRange - 1, maxRange + 1]
                },
                margin: { l: 50, r: 50, t: 80, b: 50 }
            };
            
            if (!isDarkTheme) {
                layout.xaxis.gridcolor = 'rgba(0,0,0,0.1)';
                layout.yaxis.gridcolor = 'rgba(0,0,0,0.1)';
            }
            
            Plotly.react('plot', traces, layout, {displayModeBar: false});
        }
        
        ['a', 'b'].forEach(id => {
            document.getElementById(id).addEventListener('input', updatePlot);
        });
        updatePlot();
    </script>
</body>
</html>
