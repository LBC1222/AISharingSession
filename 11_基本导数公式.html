<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本导数公式 - 高中数学公式可视化</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff; transition: all 0.3s ease;
        }
        body.light-theme { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 2.2em; margin-bottom: 10px; background: linear-gradient(90deg, #fdcb6e, #e17055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .formula-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 20px 30px; margin: 20px auto;
            display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }
        body.light-theme .formula-box { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); }
        .formula { font-size: 1.4em; color: #fdcb6e; font-family: "Times New Roman", serif; }
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; padding: 10px 20px;
            border: none; border-radius: 25px; background: rgba(255,255,255,0.2);
            color: #fff; cursor: pointer; transition: all 0.3s;
        }
        body.light-theme .theme-toggle { background: rgba(0,0,0,0.1); color: #333; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .plot-container { background: rgba(255,255,255,0.05); border-radius: 15px; min-height: 450px; }
        body.light-theme .plot-container { background: rgba(255,255,255,0.9); }
        .plot-title { text-align: center; padding: 15px; font-size: 1.3em; color: #fdcb6e; }
        .formula-list-panel {
            grid-column: 1 / -1; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.2);
        }
        body.light-theme .formula-list-panel { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); }
        .formula-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .formula-item {
            background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
        }
        body.light-theme .formula-item { background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.1); }
        .formula-item:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .formula-item .func { font-size: 1.2em; color: #74b9ff; margin-bottom: 8px; font-family: "Times New Roman", serif; }
        .formula-item .deriv { font-size: 1.2em; color: #ff7675; font-family: "Times New Roman", serif; }
        .formula-item .label { font-size: 0.9em; color: #888; margin-top: 5px; }
        .selector {
            grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            margin-bottom: 20px;
        }
        .selector-btn {
            padding: 12px 24px; border: none; border-radius: 25px; background: rgba(255,255,255,0.1);
            color: #fff; cursor: pointer; font-size: 1em; transition: all 0.3s;
        }
        body.light-theme .selector-btn { background: rgba(0,0,0,0.1); color: #333; }
        .selector-btn:hover { background: rgba(253,203,110,0.3); }
        .selector-btn.active { background: #fdcb6e; color: #333; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 深色/浅色</button>
    <div class="container">
        <header>
            <h1>📐 基本导数公式</h1>
            <div class="formula-box">
                <div class="formula">(xⁿ)' = nxⁿ⁻¹, (sinx)' = cosx, (cosx)' = -sinx</div>
            </div>
        </header>
        
        <div class="selector">
            <button class="selector-btn active" onclick="showFormula('power')">幂函数 xⁿ</button>
            <button class="selector-btn" onclick="showFormula('sin')">正弦 sin x</button>
            <button class="selector-btn" onclick="showFormula('cos')">余弦 cos x</button>
            <button class="selector-btn" onclick="showFormula('exp')">指数 eˣ</button>
            <button class="selector-btn" onclick="showFormula('ln')">对数 ln x</button>
        </div>
        
        <div class="main-content">
            <div class="plot-container">
                <div class="plot-title">📈 原函数 f(x)</div>
                <div id="funcPlot"></div>
            </div>
            <div class="plot-container">
                <div class="plot-title">📉 导函数 f'(x)</div>
                <div id="derivPlot"></div>
            </div>
            
            <div class="formula-list-panel">
                <h2 style="margin-bottom: 20px; color: #fdcb6e; text-align: center;">📚 常用导数公式表</h2>
                <div class="formula-grid">
                    <div class="formula-item" onclick="showFormula('power')">
                        <div class="func">f(x) = xⁿ</div>
                        <div class="deriv">f'(x) = nxⁿ⁻¹</div>
                        <div class="label">幂函数</div>
                    </div>
                    <div class="formula-item" onclick="showFormula('sin')">
                        <div class="func">f(x) = sin x</div>
                        <div class="deriv">f'(x) = cos x</div>
                        <div class="label">正弦函数</div>
                    </div>
                    <div class="formula-item" onclick="showFormula('cos')">
                        <div class="func">f(x) = cos x</div>
                        <div class="deriv">f'(x) = -sin x</div>
                        <div class="label">余弦函数</div>
                    </div>
                    <div class="formula-item" onclick="showFormula('exp')">
                        <div class="func">f(x) = eˣ</div>
                        <div class="deriv">f'(x) = eˣ</div>
                        <div class="label">指数函数</div>
                    </div>
                    <div class="formula-item" onclick="showFormula('ln')">
                        <div class="func">f(x) = ln x</div>
                        <div class="deriv">f'(x) = 1/x</div>
                        <div class="label">对数函数</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let isDarkTheme = true;
        let currentFormula = 'power';
        
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('light-theme');
            updatePlots();
        }
        
        function showFormula(formula) {
            currentFormula = formula;
            document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.selector-btn:nth-child(${['power','sin','cos','exp','ln'].indexOf(formula)+1})`).classList.add('active');
            updatePlots();
        }
        
        function f(x, type) {
            switch (type) {
                case 'power': return Math.pow(x, 3);
                case 'sin': return Math.sin(x);
                case 'cos': return Math.cos(x);
                case 'exp': return Math.exp(x);
                case 'ln': return x > 0 ? Math.log(x) : null;
                default: return x;
            }
        }
        
        function fPrime(x, type) {
            switch (type) {
                case 'power': return 3 * x * x;
                case 'sin': return Math.cos(x);
                case 'cos': return -Math.sin(x);
                case 'exp': return Math.exp(x);
                case 'ln': return x > 0 ? 1/x : null;
                default: return 1;
            }
        }
        
        function getRange(type) {
            switch (type) {
                case 'power': return { xMin: -3, xMax: 3, yMin: -30, yMax: 30 };
                case 'sin': return { xMin: -2*Math.PI, xMax: 2*Math.PI, yMin: -2, yMax: 2 };
                case 'cos': return { xMin: -2*Math.PI, xMax: 2*Math.PI, yMin: -2, yMax: 2 };
                case 'exp': return { xMin: -3, xMax: 3, yMin: -5, yMax: 25 };
                case 'ln': return { xMin: 0.1, xMax: 5, yMin: -5, yMax: 2 };
                default: return { xMin: -5, xMax: 5, yMin: -5, yMax: 5 };
            }
        }
        
        function getFuncName(type) {
            switch (type) {
                case 'power': return 'f(x) = x³';
                case 'sin': return 'f(x) = sin(x)';
                case 'cos': return 'f(x) = cos(x)';
                case 'exp': return 'f(x) = eˣ';
                case 'ln': return 'f(x) = ln(x)';
                default: return 'f(x)';
            }
        }
        
        function getDerivName(type) {
            switch (type) {
                case 'power': return "f'(x) = 3x²";
                case 'sin': return "f'(x) = cos(x)";
                case 'cos': return "f'(x) = -sin(x)";
                case 'exp': return "f'(x) = eˣ";
                case 'ln': return "f'(x) = 1/x";
                default: return "f'(x)";
            }
        }
        
        function updatePlots() {
            const range = getRange(currentFormula);
            const step = (range.xMax - range.xMin) / 200;
            
            const funcX = [], funcY = [];
            const derivX = [], derivY = [];
            
            for (let x = range.xMin; x <= range.xMax; x += step) {
                const fx = f(x, currentFormula);
                const fpx = fPrime(x, currentFormula);
                
                if (fx !== null && !isNaN(fx) && isFinite(fx)) {
                    funcX.push(x);
                    funcY.push(fx);
                }
                if (fpx !== null && !isNaN(fpx) && isFinite(fpx)) {
                    derivX.push(x);
                    derivY.push(fpx);
                }
            }
            
            const funcTrace = {
                x: funcX, y: funcY,
                mode: 'lines',
                name: 'f(x)',
                line: { color: '#74b9ff', width: 3 }
            };
            
            const derivTrace = {
                x: derivX, y: derivY,
                mode: 'lines',
                name: "f'(x)",
                line: { color: '#ff7675', width: 3 }
            };
            
            const axisStyle = {
                showgrid: true,
                gridcolor: isDarkTheme ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                zeroline: true,
                zerolinecolor: isDarkTheme ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)'
            };
            
            const layout = {
                title: {
                    text: isDarkTheme ? 
                        `<b>${currentFormula === 'power' ? 'f(x) = x³' : currentFormula === 'sin' ? 'f(x) = sin(x)' : currentFormula === 'cos' ? 'f(x) = cos(x)' : currentFormula === 'exp' ? 'f(x) = eˣ' : 'f(x) = ln(x)'}</b>` :
                        `<b>${currentFormula === 'power' ? 'f(x) = x³' : currentFormula === 'sin' ? 'f(x) = sin(x)' : currentFormula === 'cos' ? 'f(x) = cos(x)' : currentFormula === 'exp' ? 'f(x) = eˣ' : 'f(x) = ln(x)'}</b>`,
                    font: { size: 18, color: isDarkTheme ? '#fff' : '#333' }
                },
                showlegend: false,
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                xaxis: { ...axisStyle, range: [range.xMin, range.xMax], title: 'x' },
                yaxis: { ...axisStyle, range: [range.yMin, range.yMax], scaleanchor: 'x', scaleratio: 1 },
                margin: { l: 50, r: 30, t: 60, b: 50 }
            };
            
            Plotly.react('funcPlot', [funcTrace], layout, {displayModeBar: false});
            Plotly.react('derivPlot', [derivTrace], layout, {displayModeBar: false});
        }
        
        updatePlots();
    </script>
</body>
</html>
